<!DOCTYPE html>
<html lang="zh">
<head>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Agent</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #app { width: 100%; max-width: 760px; height: 100vh; display: flex; flex-direction: column; background: white; box-shadow: 0 0 20px rgba(0,0,0,0.1); }

    /* 登录页 */
    .auth-page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 16px; }
    .auth-page h2 { font-size: 24px; color: #333; margin-bottom: 8px; }
    .auth-page input { width: 280px; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
    .auth-page input:focus { border-color: #1a73e8; }
    .auth-page .btn { width: 280px; padding: 10px; border: none; border-radius: 8px; background: #1a73e8; color: white; font-size: 15px; cursor: pointer; }
    .auth-page .btn:hover { background: #1557b0; }
    .auth-page .switch { color: #1a73e8; cursor: pointer; font-size: 14px; }
    .auth-page .error { color: #e53935; font-size: 14px; }

    /* 聊天页 */
    .chat-page { width: 100%; height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 16px 24px; border-bottom: 1px solid #eee; font-weight: 600; font-size: 18px; color: #333; display: flex; justify-content: space-between; align-items: center; }
    .header .logout { font-size: 14px; color: #888; cursor: pointer; font-weight: 400; }
    .header .logout:hover { color: #e53935; }
    .header .new-session { font-size: 14px; color: #1a73e8; cursor: pointer; font-weight: 400; margin-right: 16px; }
    .header .new-session:hover { color: #1557b0; }
    .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .message { display: flex; gap: 12px; align-items: flex-start; }
    .message.user { flex-direction: row-reverse; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; }
    .avatar.ai { background: #e8f4fd; color: #1a73e8; }
    .avatar.user { background: #e8f5e9; color: #2e7d32; }
    .bubble { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 15px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .bubble ul, .bubble ol { padding-left: 20px; margin: 4px 0; }
    .bubble li { margin: 2px 0; }
    .bubble strong { font-weight: 600; }
    .bubble p { margin: 0; }
    .bubble p + p { margin-top: 6px; }
    .message.ai .bubble { background: #f8f9fa; color: #333; border-top-left-radius: 4px; }
    .message.user .bubble { background: #1a73e8; color: white; border-top-right-radius: 4px; }
    .thinking { display: flex; gap: 4px; align-items: center; padding: 12px 16px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #999; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
    .input-area { padding: 16px 24px; border-top: 1px solid #eee; display: flex; gap: 12px; }
    textarea { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 24px; resize: none; font-size: 15px; font-family: inherit; outline: none; height: 48px; line-height: 24px; transition: border-color 0.2s; }
    textarea:focus { border-color: #1a73e8; }
    button { width: 48px; height: 48px; border-radius: 50%; border: none; background: #1a73e8; color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; flex-shrink: 0; }
    button:hover:not(:disabled) { background: #1557b0; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    button.stop { background: #e53935; }
    button.stop:hover { background: #b71c1c; }
  </style>
</head>
<body>
<div id="app">

  <!-- 登录/注册页 -->
  <div v-if="!token" class="auth-page">
    <h2>{{ isLogin ? '登录' : '注册' }}</h2>
    <input v-if="!isLogin" v-model="regForm.username" placeholder="用户名" />
    <input v-if="!isLogin" v-model="regForm.email" placeholder="邮箱" />
    <input v-if="isLogin" v-model="authUsername" placeholder="用户名" @keydown.enter="doLogin" />
    <input v-if="isLogin" v-model="authPassword" type="password" placeholder="密码" @keydown.enter="doLogin" />
    <input v-if="!isLogin" v-model="regForm.password" type="password" placeholder="密码" @keydown.enter="doRegister" />
    <button class="btn" @click="isLogin ? doLogin() : doRegister()">
      {{ isLogin ? '登录' : '注册' }}
    </button>
    <span class="switch" @click="isLogin = !isLogin; authError = ''">
      {{ isLogin ? '没有账号？去注册' : '已有账号？去登录' }}
    </span>
    <div v-if="authError" class="error">{{ authError }}</div>
  </div>

  <!-- 聊天页 -->
  <div v-else class="chat-page">
    <div class="header">
      <span>Mini Agent</span>
      <div>
        <span class="new-session" @click="newSession">新建会话</span>
        <span class="logout" @click="logout">退出登录</span>
      </div>
    </div>

    <div class="messages" ref="msgBox">
      <div v-for="(msg, i) in messages" :key="i" :class="['message', msg.role]">
        <div :class="['avatar', msg.role]">{{ msg.role === 'ai' ? 'AI' : '我' }}</div>
        <div v-if="msg.thinking" class="bubble thinking">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div v-else class="bubble" v-html="renderMd(msg.content)"></div>
      </div>
    </div>

    <div class="input-area">
      <textarea
        v-model="input"
        placeholder="输入消息，按 Enter 发送..."
        @keydown.enter.exact.prevent="send"
        :disabled="loading"
      ></textarea>
      <button v-if="!loading" @click="send" :disabled="!input.trim()">&#9658;</button>
      <button v-else class="stop" @click="stop">&#9632;</button>
    </div>
  </div>

</div>

<script>
const { createApp, ref, nextTick } = Vue

createApp({
  setup() {
    const API_BASE = 'http://127.0.0.1:8000'

    // ── 认证状态 ──
    const token = ref(localStorage.getItem('access_token') || '')
    const isLogin = ref(true)
    const authUsername = ref('')
    const authPassword = ref('')
    const regForm = ref({ username: '', email: '', password: '' })
    const authError = ref('')

    const saveToken = (t) => {
      token.value = t
      localStorage.setItem('access_token', t)
    }

    const logout = () => {
      token.value = ''
      localStorage.removeItem('access_token')
      sessionId.value = null
      localStorage.removeItem('session_id')
      messages.value = [{ role: 'ai', content: '你好！我是 Mini Agent，有什么可以帮你的？' }]
    }

    const doLogin = async () => {
      authError.value = ''
      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: authUsername.value, password: authPassword.value })
        })
        const data = await res.json()
        if (!res.ok) { authError.value = data.detail || '登录失败'; return }
        saveToken(data.access_token)
      } catch (e) {
        authError.value = '网络错误，请重试'
      }
    }

    const doRegister = async () => {
      authError.value = ''
      try {
        const res = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(regForm.value)
        })
        const data = await res.json()
        if (!res.ok) { authError.value = data.detail || '注册失败'; return }
        saveToken(data.access_token)
      } catch (e) {
        authError.value = '网络错误，请重试'
      }
    }

    // ── 聊天状态 ──
    const messages = ref([
      { role: 'ai', content: '你好！我是 Mini Agent，有什么可以帮你的？' }
    ])
    const input = ref('')
    const loading = ref(false)
    const msgBox = ref(null)
    const sessionId = ref(localStorage.getItem('session_id') || null)
    let controller = null

    const newSession = () => {
      sessionId.value = null
      localStorage.removeItem('session_id')
      messages.value = [{ role: 'ai', content: '你好！我是 Mini Agent，有什么可以帮你的？' }]
    }

    const loadSession = async (uuid) => {
      try {
        const res = await fetch(`${API_BASE}/sessions/${uuid}/messages?page_size=200`, {
          headers: { 'Authorization': `Bearer ${token.value}` }
        })
        if (res.status === 401) { logout(); return }
        if (res.status === 404 || res.status === 500) { newSession(); return }
        if (!res.ok) { newSession(); return }
        const data = await res.json()
        if (data.messages && data.messages.length > 0) {
          messages.value = data.messages.map(m => ({
            role: m.role === 'user' ? 'user' : 'ai',
            content: m.content
          }))
          scrollToBottom()
        }
      } catch (e) {
        newSession()
      }
    }

    const scrollToBottom = () => {
      nextTick(() => {
        if (msgBox.value) msgBox.value.scrollTop = msgBox.value.scrollHeight
      })
    }

    const send = async () => {
      const text = input.value.trim()
      if (!text || loading.value) return
      if (!token.value) { alert('请先登录'); return }

      messages.value.push({ role: 'user', content: text })
      input.value = ''
      loading.value = true
      scrollToBottom()

      messages.value.push({ role: 'ai', content: '', thinking: true })
      const botIdx = messages.value.length - 1
      scrollToBottom()

      controller = new AbortController()

      try {
        const res = await fetch(`${API_BASE}/chat/stream`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token.value}`
          },
          body: JSON.stringify({ message: text, session_id: sessionId.value || undefined }),
          signal: controller.signal
        })

        // 401 检测：token 过期或无效
        if (res.status === 401) {
          logout()
          messages.value[botIdx] = { role: 'ai', content: '登录已过期，请重新登录。', thinking: false }
          loading.value = false
          return
        }

        const reader = res.body.getReader()
        const decoder = new TextDecoder()
        let reply = ''

        while (true) {
          const { done, value } = await reader.read()
          if (done) break

          const chunk = decoder.decode(value)
          const lines = chunk.split('\n')

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const data = line.slice(6)
              if (data === '[DONE]') break
              // 保存后端返回的 session_uuid
              if (data.startsWith('[SESSION:') && data.endsWith(']')) {
                const uuid = data.slice(9, -1)
                sessionId.value = uuid
                localStorage.setItem('session_id', uuid)
                continue
              }
              reply += data
              messages.value[botIdx] = { role: 'ai', content: reply, thinking: false }
              scrollToBottom()
            }
          }
        }
      } catch (e) {
        if (e.name === 'AbortError') {
          messages.value[botIdx] = {
            role: 'ai',
            content: messages.value[botIdx].content + '（已停止）',
            thinking: false
          }
        } else {
          messages.value[botIdx] = { role: 'ai', content: '出错了，请重试。', thinking: false }
        }
      } finally {
        loading.value = false
        controller = null
        scrollToBottom()
      }
    }

    const stop = () => {
      if (controller) controller.abort()
    }

    const renderMd = (text) => marked.parse(text || '').trim()

    // 首屏：有 token + sessionId 时加载历史消息
    if (token.value && sessionId.value) {
      loadSession(sessionId.value)
    }

    return {
      token, isLogin, authUsername, authPassword, regForm, authError,
      doLogin, doRegister, logout,
      messages, input, loading, msgBox, send, stop, renderMd, newSession
    }
  }
}).mount('#app')
</script>
</body>
</html>
